baseURL: https://marsboy02.github.io/
title: "marsboy's blog"
theme: gandanham

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: EN
    weight: 1
    menus:
      main:
        - name: About
          pageRef: /about
          weight: 10
        - name: Posts
          pageRef: /posts
          weight: 20
  ko:
    languageName: KO
    weight: 2
    menus:
      main:
        - name: About
          pageRef: /about
          weight: 10
        - name: Posts
          pageRef: /posts
          weight: 20
  ja:
