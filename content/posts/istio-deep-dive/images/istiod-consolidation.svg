<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker>
  </defs>

  <rect width="800" height="260" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Istio Control Plane: Before &amp; After Consolidation</text>

  <!-- VS divider -->
  <line x1="400" y1="52" x2="400" y2="250" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="374" y="180" width="52" height="28" rx="14" fill="#0f172a"/>
  <text x="400" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="white">vs</text>

  <!-- ===== LEFT: Before (Istio < 1.5) ===== -->
  <text x="200" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Before (Istio &lt; 1.5)</text>

  <!-- Pilot -->
  <rect x="60" y="86" width="130" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#s)"/>
  <text x="125" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Pilot</text>
  <text x="125" y="134" text-anchor="middle" font-size="9" fill="#991b1b">Traffic config</text>
  <text x="125" y="148" text-anchor="middle" font-size="9" fill="#991b1b">xDS push</text>

  <!-- Citadel -->
  <rect x="210" y="86" width="130" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#s)"/>
  <text x="275" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Citadel</text>
  <text x="275" y="134" text-anchor="middle" font-size="9" fill="#991b1b">Cert CA</text>
  <text x="275" y="148" text-anchor="middle" font-size="9" fill="#991b1b">mTLS certs</text>

  <!-- Galley -->
  <rect x="135" y="174" width="130" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#s)"/>
  <text x="200" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Galley</text>
  <text x="200" y="222" text-anchor="middle" font-size="9" fill="#991b1b">Config validation</text>
  <text x="200" y="236" text-anchor="middle" font-size="9" fill="#991b1b">K8s API abstraction</text>

  <!-- Network arrows between them -->
  <line x1="190" y1="121" x2="210" y2="121" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="168" y1="156" x2="168" y2="174" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="240" y1="156" x2="240" y2="174" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== RIGHT: After (Istio >= 1.5) ===== -->
  <text x="600" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">After (Istio ≥ 1.5)</text>

  <!-- istiod unified box -->
  <rect x="470" y="86" width="260" height="160" rx="12" fill="#059669" filter="url(#s)"/>
  <text x="600" y="116" text-anchor="middle" font-size="18" font-weight="700" fill="white">istiod</text>
  <text x="600" y="138" text-anchor="middle" font-size="10" fill="#a7f3d0">Single Binary — "d" for daemon</text>

  <!-- Sub-functions inside istiod -->
  <rect x="490" y="152" width="100" height="36" rx="6" fill="#065f46"/>
  <text x="540" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#a7f3d0">Pilot</text>

  <rect x="600" y="152" width="110" height="36" rx="6" fill="#065f46"/>
  <text x="655" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#a7f3d0">Citadel</text>

  <rect x="540" y="198" width="120" height="36" rx="6" fill="#065f46"/>
  <text x="600" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#a7f3d0">Galley</text>


</svg>