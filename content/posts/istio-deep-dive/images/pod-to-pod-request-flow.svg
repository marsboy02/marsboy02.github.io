<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#dc2626"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
  </defs>

  <rect width="760" height="410" fill="#f8fafc" rx="12"/>
  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Request Flow: Pod A → Pod B (6 Steps)</text>

  <!-- Pod A region -->
  <rect x="30" y="50" width="310" height="350" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" opacity="0.2"/>
  <text x="185" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Pod A (Client)</text>

  <!-- Pod B region -->
  <rect x="420" y="50" width="310" height="350" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <text x="575" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Pod B (Server)</text>

  <!-- Step ①: Pod A App -->
  <rect x="100" y="86" width="170" height="40" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#s)"/>
  <text x="185" y="111" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">App Container</text>
  <circle cx="56" cy="106" r="14" fill="#dc2626"/><text x="56" y="111" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  <line x1="185" y1="126" x2="185" y2="156" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="200" y="146" font-size="8" fill="#dc2626">connect()</text>

  <!-- Step ②: Pod A OUTPUT hook -->
  <rect x="90" y="162" width="190" height="44" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#s)"/>
  <text x="185" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">OUTPUT hook</text>
  <text x="185" y="198" text-anchor="middle" font-size="9" fill="#991b1b">ISTIO_OUTPUT chain</text>
  <circle cx="56" cy="184" r="14" fill="#dc2626"/><text x="56" y="189" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  <line x1="185" y1="206" x2="185" y2="236" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="200" y="226" font-size="8" fill="#dc2626">REDIRECT :15001</text>

  <!-- Step ③: Pod A Envoy -->
  <rect x="80" y="242" width="210" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#s)"/>
  <text x="185" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Envoy Sidecar</text>
  <text x="185" y="286" text-anchor="middle" font-size="8" fill="#64748b">SO_ORIGINAL_DST → route → mTLS handshake</text>
  <circle cx="56" cy="270" r="14" fill="#dc2626"/><text x="56" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

  <!-- Step ④: Pod B PREROUTING -->
  <rect x="480" y="242" width="190" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#s)"/>
  <text x="575" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">PREROUTING hook</text>
  <text x="575" y="278" text-anchor="middle" font-size="9" fill="#1e40af">ISTIO_INBOUND chain</text>
  <circle cx="704" cy="264" r="14" fill="#2563eb"/><text x="704" y="269" text-anchor="middle" font-size="11" font-weight="700" fill="white">4</text>
  <line x1="575" y1="242" x2="575" y2="214" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="590" y="232" font-size="8" fill="#2563eb">REDIRECT :15006</text>

  <!-- Step ⑤: Pod B Envoy -->
  <rect x="470" y="152" width="210" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#s)"/>
  <text x="575" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Envoy Sidecar</text>
  <text x="575" y="196" text-anchor="middle" font-size="8" fill="#64748b">mTLS verify → AuthzPolicy → metrics</text>
  <circle cx="704" cy="180" r="14" fill="#2563eb"/><text x="704" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="white">5</text>
  <line x1="575" y1="152" x2="575" y2="130" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="590" y="144" font-size="8" fill="#059669">localhost</text>

  <!-- Step ⑥: Pod B App -->
  <rect x="490" y="86" width="170" height="40" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#s)"/>
  <text x="575" y="111" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">App Container</text>
  <circle cx="704" cy="106" r="14" fill="#2563eb"/><text x="704" y="111" text-anchor="middle" font-size="11" font-weight="700" fill="white">6</text>

  <!-- Network (center) — box first, then arrows on top -->
  <rect x="310" y="340" width="140" height="40" rx="20" fill="#f59e0b" filter="url(#s)"/>
  <text x="380" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="white">CNI Network</text>
  <polyline points="185,298 185,360 302,360" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <polyline points="458,360 575,360 575,294" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>

  <!-- mTLS label -->
  <rect x="338" y="326" width="84" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">mTLS</text>

</svg>