<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
    <marker id="alo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
  </defs>

  <rect width="680" height="520" fill="#f8fafc" rx="12"/>
  <text x="340" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">xDS: Real-time Config Sync via gRPC Stream</text>

  <!-- Envoy column header -->
  <rect x="60" y="52" width="140" height="44" rx="10" fill="#059669" filter="url(#s)"/>
  <text x="130" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">Envoy</text>
  <text x="130" y="88" text-anchor="middle" font-size="9" fill="#a7f3d0">Sidecar Proxy</text>

  <!-- istiod column header -->
  <rect x="480" y="52" width="140" height="44" rx="10" fill="#2563eb" filter="url(#s)"/>
  <text x="550" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">istiod</text>
  <text x="550" y="88" text-anchor="middle" font-size="9" fill="#bfdbfe">:15012</text>

  <!-- Vertical lifelines -->
  <line x1="130" y1="96" x2="130" y2="510" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="550" y1="96" x2="550" y2="510" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Step 1: gRPC CONNECT -->
  <line x1="138" y1="120" x2="542" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="340" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">gRPC CONNECT</text>

  <!-- Initial sync responses -->
  <rect x="220" y="140" width="240" height="22" rx="4" fill="#ecfdf5" stroke="#059669" stroke-width="1" opacity="0.6"/>
  <text x="340" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Initial Config Push</text>

  <line x1="542" y1="182" x2="138" y2="182" stroke="#059669" stroke-width="1.5" marker-end="url(#al)"/>
  <text x="340" y="178" text-anchor="middle" font-size="9" fill="#059669">LDS — Listener config</text>

  <line x1="542" y1="206" x2="138" y2="206" stroke="#059669" stroke-width="1.5" marker-end="url(#al)"/>
  <text x="340" y="202" text-anchor="middle" font-size="9" fill="#059669">RDS — Route config</text>

  <line x1="542" y1="230" x2="138" y2="230" stroke="#059669" stroke-width="1.5" marker-end="url(#al)"/>
  <text x="340" y="226" text-anchor="middle" font-size="9" fill="#059669">CDS — Cluster config</text>

  <line x1="542" y1="254" x2="138" y2="254" stroke="#059669" stroke-width="1.5" marker-end="url(#al)"/>
  <text x="340" y="250" text-anchor="middle" font-size="9" fill="#059669">EDS — Endpoint list</text>

  <line x1="542" y1="278" x2="138" y2="278" stroke="#059669" stroke-width="1.5" marker-end="url(#al)"/>
  <text x="340" y="274" text-anchor="middle" font-size="9" fill="#059669">SDS — Certificates</text>

  <!-- Long-lived stream indicator -->
  <rect x="220" y="290" width="240" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="340" y="305" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Long-lived stream maintained</text>

  <!-- Event 1: New Pod -->
  <rect x="570" y="332" width="100" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="620" y="350" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">New Pod up</text>

  <line x1="542" y1="374" x2="138" y2="374" stroke="#f59e0b" stroke-width="2" marker-end="url(#alo)"/>
  <text x="340" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">EDS update — Endpoint added</text>

  <!-- Event 2: VirtualService changed -->
  <rect x="570" y="400" width="100" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="620" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">VS changed</text>

  <line x1="542" y1="442" x2="138" y2="442" stroke="#f59e0b" stroke-width="2" marker-end="url(#alo)"/>
  <text x="340" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">RDS update — Route changed</text>

  <!-- ADS note -->
  <rect x="100" y="470" width="480" height="36" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="340" y="493" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">ADS (Aggregated Discovery Service) — all xDS in a single gRPC stream</text>

</svg>
