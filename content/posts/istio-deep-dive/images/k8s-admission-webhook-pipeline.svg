<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
  </defs>

  <rect width="820" height="440" fill="#f8fafc" rx="12"/>
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Sidecar Injection: Mutating Admission Webhook</text>

  <!-- API Server boundary -->
  <rect x="120" y="48" width="580" height="230" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Kubernetes API Server Pipeline</text>

  <!-- kubectl -->
  <rect x="20" y="120" width="80" height="44" rx="8" fill="#1e293b" filter="url(#s)"/>
  <text x="60" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="white">kubectl</text>

  <!-- Arrow to AuthN -->
  <line x1="100" y1="142" x2="138" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 1: AuthN -->
  <rect x="144" y="118" width="88" height="48" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#s)"/>
  <text x="188" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">AuthN</text>
  <text x="188" y="155" text-anchor="middle" font-size="8" fill="#64748b">Who are you?</text>

  <line x1="232" y1="142" x2="254" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 2: AuthZ -->
  <rect x="260" y="118" width="88" height="48" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#s)"/>
  <text x="304" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">AuthZ</text>
  <text x="304" y="155" text-anchor="middle" font-size="8" fill="#64748b">Allowed?</text>

  <line x1="348" y1="142" x2="370" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 3: Mutating Webhook (highlighted) -->
  <rect x="376" y="108" width="116" height="68" rx="10" fill="#7c3aed" filter="url(#s)"/>
  <text x="434" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="white">Mutating</text>
  <text x="434" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="white">Webhook</text>
  <text x="434" y="166" text-anchor="middle" font-size="8" fill="#ddd6fe">★ Modify Pod spec</text>

  <line x1="492" y1="142" x2="514" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 4: Validation -->
  <rect x="520" y="118" width="88" height="48" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#s)"/>
  <text x="564" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">Validating</text>
  <text x="564" y="155" text-anchor="middle" font-size="8" fill="#64748b">Reject only</text>

  <line x1="608" y1="142" x2="630" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 5: etcd -->
  <rect x="636" y="118" width="52" height="48" rx="8" fill="#1e293b" filter="url(#s)"/>
  <text x="662" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="white">etcd</text>

  <!-- Arrow from Mutating Webhook down to istiod -->
  <line x1="434" y1="176" x2="434" y2="230" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="434" y1="230" x2="434" y2="290" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- istiod as webhook server -->
  <rect x="340" y="296" width="188" height="58" rx="10" fill="#7c3aed" filter="url(#s)"/>
  <text x="434" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="white">istiod /inject</text>
  <text x="434" y="340" text-anchor="middle" font-size="9" fill="#ddd6fe">Webhook Server</text>

  <!-- Return arrow: JSON Patch -->
  <path d="M340 325 Q280 325 280 280 Q280 218 376 178" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="240" y="265" font-size="9" fill="#7c3aed" font-weight="600">JSON Patch</text>

  <!-- Injected result -->
  <rect x="510" y="370" width="280" height="58" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#s)"/>
  <text x="650" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Injected Pod Spec</text>
  <text x="650" y="410" text-anchor="middle" font-size="9" fill="#64748b">+ istio-init (iptables) + istio-proxy (Envoy)</text>

  <line x1="528" y1="348" x2="580" y2="370" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar)"/>

  <!-- Namespace label callout -->
  <rect x="30" y="296" width="250" height="46" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" filter="url(#s)"/>
  <text x="155" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">Trigger Condition</text>
  <text x="155" y="332" text-anchor="middle" font-size="9" fill="#92400e">namespace label: istio-injection=enabled</text>

  <line x1="280" y1="319" x2="340" y2="319" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>

</svg>