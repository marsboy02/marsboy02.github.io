<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
  </defs>

  <rect width="600" height="420" fill="#f8fafc" rx="12"/>
  <text x="300" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">TLS Handshake (HTTPS)</text>

  <!-- Browser -->
  <rect x="60" y="52" width="130" height="44" rx="10" fill="#059669" filter="url(#s)"/>
  <text x="125" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">Browser</text>
  <text x="125" y="88" text-anchor="middle" font-size="9" fill="#a7f3d0">Client</text>

  <!-- Server -->
  <rect x="410" y="52" width="130" height="44" rx="10" fill="#2563eb" filter="url(#s)"/>
  <text x="475" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="white">github.com</text>
  <text x="475" y="88" text-anchor="middle" font-size="9" fill="#bfdbfe">Server</text>

  <!-- Lifelines -->
  <line x1="125" y1="96" x2="125" y2="400" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="475" y1="96" x2="475" y2="400" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Step 1: ClientHello -->
  <line x1="133" y1="120" x2="467" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="300" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">ClientHello</text>
  <text x="300" y="136" text-anchor="middle" font-size="8" fill="#64748b">Supported cipher suites</text>

  <!-- Step 2: ServerHello -->
  <line x1="467" y1="160" x2="133" y2="160" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
  <text x="300" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">ServerHello</text>
  <text x="300" y="176" text-anchor="middle" font-size="8" fill="#64748b">Selected cipher suite</text>

  <!-- Step 3: Certificate -->
  <line x1="467" y1="200" x2="133" y2="200" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
  <text x="300" y="194" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Certificate</text>
  <text x="300" y="216" text-anchor="middle" font-size="8" fill="#64748b">Server's X.509 certificate</text>

  <!-- Browser verification -->
  <rect x="62" y="232" width="200" height="48" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="162" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Browser verifies:</text>
  <text x="162" y="264" text-anchor="middle" font-size="8" fill="#166534">Trusted CA? Domain matches?</text>

  <!-- Step 4: Key Exchange -->
  <line x1="133" y1="300" x2="467" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="300" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Key Exchange</text>
  <text x="300" y="316" text-anchor="middle" font-size="8" fill="#64748b">Session key negotiation</text>

  <!-- Encrypted communication -->
  <line x1="133" y1="350" x2="467" y2="350" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,4"/>
  <line x1="467" y1="360" x2="133" y2="360" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,4"/>
  <rect x="220" y="340" width="160" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="300" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#d97706">Encrypted</text>

  <!-- Key point -->
  <text x="300" y="400" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Only the server proves its identity</text>

</svg>
