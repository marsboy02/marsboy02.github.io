<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#dc2626"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
  </defs>

  <rect width="820" height="460" fill="#f8fafc" rx="12"/>
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">TLS vs mTLS Handshake</text>

  <!-- VS divider -->
  <line x1="410" y1="48" x2="410" y2="440" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="384" y="226" width="52" height="28" rx="14" fill="#0f172a"/>
  <text x="410" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="white">vs</text>

  <!-- ===== LEFT: TLS ===== -->
  <text x="205" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Standard TLS (HTTPS)</text>

  <!-- Client -->
  <rect x="40" y="82" width="100" height="36" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#s)"/>
  <text x="90" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Client</text>
  <!-- Server -->
  <rect x="260" y="82" width="100" height="36" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#s)"/>
  <text x="310" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Server</text>

  <!-- Lifelines -->
  <line x1="90" y1="118" x2="90" y2="390" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="310" y1="118" x2="310" y2="390" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Step 1: ClientHello -->
  <line x1="96" y1="148" x2="304" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="200" y="142" text-anchor="middle" font-size="9" fill="#475569">ClientHello</text>

  <!-- Step 2: ServerHello + Cert -->
  <line x1="304" y1="188" x2="96" y2="188" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="200" y="182" text-anchor="middle" font-size="9" fill="#dc2626">ServerHello + Server Cert</text>

  <!-- Step 3: Client verifies -->
  <rect x="48" y="206" width="144" height="24" rx="4" fill="#f1f5f9"/>
  <text x="120" y="222" text-anchor="middle" font-size="8" fill="#475569">Client verifies server cert ✓</text>

  <!-- Step 4: Key Exchange -->
  <line x1="96" y1="248" x2="304" y2="248" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="200" y="242" text-anchor="middle" font-size="9" fill="#475569">Key Exchange</text>

  <!-- Encrypted -->
  <rect x="70" y="274" width="260" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="200" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Encrypted Channel</text>

  <!-- Only server proved identity -->
  <rect x="54" y="330" width="260" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="184" y="352" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Only server proves identity</text>
  <text x="184" y="370" text-anchor="middle" font-size="9" fill="#991b1b">Client is anonymous (no cert)</text>

  <!-- ===== RIGHT: mTLS ===== -->
  <text x="615" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">Mutual TLS (Istio)</text>

  <!-- Client (Envoy A) -->
  <rect x="450" y="82" width="100" height="36" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#s)"/>
  <text x="500" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Envoy A</text>
  <!-- Server (Envoy B) -->
  <rect x="670" y="82" width="100" height="36" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#s)"/>
  <text x="720" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Envoy B</text>

  <!-- Lifelines -->
  <line x1="500" y1="118" x2="500" y2="390" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="720" y1="118" x2="720" y2="390" stroke="#059669" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Step 1: ClientHello -->
  <line x1="506" y1="148" x2="714" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="610" y="142" text-anchor="middle" font-size="9" fill="#475569">ClientHello</text>

  <!-- Step 2: ServerHello + Cert + CertRequest -->
  <line x1="714" y1="180" x2="506" y2="180" stroke="#059669" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="610" y="174" text-anchor="middle" font-size="9" fill="#059669">ServerHello + Cert + CertRequest</text>

  <!-- Step 3: Client sends cert too -->
  <line x1="506" y1="210" x2="714" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="610" y="204" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="600">★ Client Cert (SPIFFE ID)</text>

  <!-- Both verify -->
  <rect x="458" y="228" width="120" height="24" rx="4" fill="#eff6ff"/>
  <text x="518" y="244" text-anchor="middle" font-size="8" fill="#2563eb">Verify server cert ✓</text>
  <rect x="650" y="228" width="120" height="24" rx="4" fill="#ecfdf5"/>
  <text x="710" y="244" text-anchor="middle" font-size="8" fill="#059669">Verify client cert ✓</text>

  <!-- Key Exchange -->
  <line x1="506" y1="270" x2="714" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="610" y="264" text-anchor="middle" font-size="9" fill="#475569">Key Exchange</text>

  <!-- Encrypted -->
  <rect x="480" y="290" width="260" height="30" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="610" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Encrypted Channel</text>

  <!-- Both proved identity -->
  <rect x="464" y="340" width="260" height="50" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="594" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Both sides prove identity</text>
  <text x="594" y="380" text-anchor="middle" font-size="9" fill="#166534">SPIFFE ID verified via istiod CA</text>

  <!-- Bottom comparison -->
  <rect x="120" y="410" width="580" height="36" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="410" y="433" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">mTLS = encryption + mutual authentication → foundation for Zero Trust</text>

</svg>