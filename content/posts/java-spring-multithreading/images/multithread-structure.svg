<svg xmlns="http://www.w3.org/2000/svg" width="800" height="460" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Single-thread vs Multi-thread Process</text>

  <!-- ===== Left: Single-thread Process ===== -->
  <text x="175" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#666666">Single-thread</text>

  <!-- Process container -->
  <rect x="60" y="70" width="230" height="370" rx="8" fill="white" stroke="#666666" stroke-width="2"/>

  <!-- Code -->
  <rect x="70" y="80" width="210" height="60" rx="4" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="175" y="115" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4A90D9">Code</text>

  <!-- Data -->
  <rect x="70" y="148" width="210" height="60" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1.2"/>
  <text x="175" y="183" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E8744F">Data</text>

  <!-- Heap -->
  <rect x="70" y="216" width="210" height="60" rx="4" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.2"/>
  <text x="175" y="251" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#50C878">Heap</text>

  <!-- Single Stack -->
  <rect x="70" y="340" width="210" height="90" rx="4" fill="#E8744F" opacity="0.35" stroke="#E8744F" stroke-width="1.2"/>
  <text x="175" y="380" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E8744F">Stack</text>
  <text x="175" y="400" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666666">(Thread 1)</text>

  <!-- Free space -->
  <rect x="70" y="284" width="210" height="48" rx="0" fill="none" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="175" y="313" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BBBBBB" font-style="italic">free</text>

  <!-- ===== Right: Multi-thread Process ===== -->
  <text x="570" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#666666">Multi-thread</text>

  <!-- Process container -->
  <rect x="390" y="70" width="360" height="370" rx="8" fill="white" stroke="#666666" stroke-width="2"/>

  <!-- Shared label -->
  <rect x="400" y="74" width="60" height="18" rx="9" fill="#4A90D9" opacity="0.8"/>
  <text x="430" y="87" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">Shared</text>

  <!-- Code -->
  <rect x="400" y="96" width="340" height="50" rx="4" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="570" y="126" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4A90D9">Code</text>

  <!-- Data -->
  <rect x="400" y="152" width="340" height="50" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1.2"/>
  <text x="570" y="182" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E8744F">Data</text>

  <!-- Heap -->
  <rect x="400" y="208" width="340" height="50" rx="4" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.2"/>
  <text x="570" y="238" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#50C878">Heap</text>

  <!-- Free space -->
  <rect x="400" y="264" width="340" height="30" rx="0" fill="none" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="570" y="284" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BBBBBB" font-style="italic">free</text>

  <!-- Thread 1 Stack -->
  <rect x="404" y="300" width="104" height="130" rx="4" fill="#E8744F" opacity="0.3" stroke="#E8744F" stroke-width="1.2"/>
  <text x="456" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Stack</text>
  <text x="456" y="372" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Thread 1</text>

  <!-- Thread 2 Stack -->
  <rect x="518" y="300" width="104" height="130" rx="4" fill="#E8744F" opacity="0.3" stroke="#E8744F" stroke-width="1.2"/>
  <text x="570" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Stack</text>
  <text x="570" y="372" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Thread 2</text>

  <!-- Thread 3 Stack -->
  <rect x="632" y="300" width="104" height="130" rx="4" fill="#E8744F" opacity="0.3" stroke="#E8744F" stroke-width="1.2"/>
  <text x="684" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Stack</text>
  <text x="684" y="372" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Thread 3</text>

  <!-- VS divider -->
  <text x="330" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#BBBBBB">vs</text>
</svg>
