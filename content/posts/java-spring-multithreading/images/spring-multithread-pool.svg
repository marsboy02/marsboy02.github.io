<svg xmlns="http://www.w3.org/2000/svg" width="800" height="370" viewBox="0 0 800 370">
  <rect width="800" height="370" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Java/Spring: Multi-thread Pool</text>

  <defs>
    <marker id="arrowBlue2" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4A90D9"/>
    </marker>
    <marker id="arrowOrange2" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E8744F"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#50C878"/>
    </marker>
  </defs>

  <!-- Requests -->
  <rect x="30" y="90" width="100" height="36" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="80" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Request 1</text>

  <rect x="30" y="160" width="100" height="36" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="80" y="183" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Request 2</text>

  <rect x="30" y="230" width="100" height="36" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="80" y="253" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Request 3</text>

  <!-- Thread Pool box -->
  <rect x="190" y="75" width="200" height="220" rx="8" fill="#E8744F" opacity="0.08" stroke="#E8744F" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="290" y="98" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E8744F">Tomcat Thread Pool</text>

  <!-- Thread 1 -->
  <rect x="210" y="110" width="160" height="36" rx="6" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1.5"/>
  <text x="290" y="133" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Thread 1</text>

  <!-- Thread 2 -->
  <rect x="210" y="160" width="160" height="36" rx="6" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1.5"/>
  <text x="290" y="183" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Thread 2</text>

  <!-- Thread 3 -->
  <rect x="210" y="210" width="160" height="36" rx="6" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1.5"/>
  <text x="290" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Thread 3</text>

  <!-- Arrows: Request → Thread -->
  <line x1="130" y1="108" x2="205" y2="125" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue2)"/>
  <line x1="130" y1="178" x2="205" y2="178" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue2)"/>
  <line x1="130" y1="248" x2="205" y2="230" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue2)"/>

  <!-- DB Connection Pool box -->
  <rect x="450" y="75" width="170" height="220" rx="8" fill="#50C878" opacity="0.08" stroke="#50C878" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="535" y="98" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#50C878">Connection Pool</text>

  <!-- Connection 1 -->
  <rect x="465" y="110" width="140" height="36" rx="6" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.5"/>
  <text x="535" y="133" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#50C878">Connection 1</text>

  <!-- Connection 2 -->
  <rect x="465" y="160" width="140" height="36" rx="6" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.5"/>
  <text x="535" y="183" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#50C878">Connection 2</text>

  <!-- Connection 3 -->
  <rect x="465" y="210" width="140" height="36" rx="6" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.5"/>
  <text x="535" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#50C878">Connection 3</text>

  <!-- Arrows: Thread → Connection -->
  <line x1="370" y1="128" x2="460" y2="128" stroke="#E8744F" stroke-width="1.5" marker-end="url(#arrowOrange2)"/>
  <line x1="370" y1="178" x2="460" y2="178" stroke="#E8744F" stroke-width="1.5" marker-end="url(#arrowOrange2)"/>
  <line x1="370" y1="228" x2="460" y2="228" stroke="#E8744F" stroke-width="1.5" marker-end="url(#arrowOrange2)"/>

  <!-- Response -->
  <rect x="680" y="90" width="90" height="36" rx="6" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="725" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4A90D9">Response</text>

  <rect x="680" y="160" width="90" height="36" rx="6" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="725" y="183" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4A90D9">Response</text>

  <rect x="680" y="230" width="90" height="36" rx="6" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="725" y="253" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4A90D9">Response</text>

  <!-- Arrows: Connection → Response -->
  <line x1="605" y1="128" x2="675" y2="108" stroke="#50C878" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>
  <line x1="605" y1="178" x2="675" y2="178" stroke="#50C878" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>
  <line x1="605" y1="228" x2="675" y2="248" stroke="#50C878" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

  <!-- Blocking label -->
  <text x="400" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">Each thread handles one request synchronously (blocking)</text>
</svg>
