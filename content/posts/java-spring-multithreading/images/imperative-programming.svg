<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <rect width="800" height="340" fill="#F8F9FA"/>

  <defs>
    <marker id="routeArr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#E8744F"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Imperative (HOW)</text>
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">Every step of the route is explicitly specified</text>

  <!-- Map background -->
  <rect x="40" y="66" width="720" height="240" rx="12" fill="#EEF4FB" stroke="#CCDDEE" stroke-width="2"/>

  <!-- Map grid lines (subtle) -->
  <line x1="40" y1="130" x2="760" y2="130" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="40" y1="186" x2="760" y2="186" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="40" y1="242" x2="760" y2="242" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="200" y1="66" x2="200" y2="306" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="380" y1="66" x2="380" y2="306" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="560" y1="66" x2="560" y2="306" stroke="#DDEEFF" stroke-width="1"/>

  <!-- Route path: Home -> Store -> Snack Bar -> Restaurant -> School -->
  <!-- Path line -->
  <polyline points="110,186 230,140 390,210 570,150 680,186"
    fill="none" stroke="#E8744F" stroke-width="3" stroke-linejoin="round" marker-end="url(#routeArr)"/>

  <!-- Step numbers on path -->
  <circle cx="170" cy="163" r="12" fill="#E8744F"/>
  <text x="170" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">1</text>
  <circle cx="310" cy="175" r="12" fill="#E8744F"/>
  <text x="310" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">2</text>
  <circle cx="480" cy="180" r="12" fill="#E8744F"/>
  <text x="480" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">3</text>
  <circle cx="625" cy="168" r="12" fill="#E8744F"/>
  <text x="625" y="173" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">4</text>

  <!-- Home -->
  <rect x="70" y="164" width="80" height="44" rx="8" fill="#4A90D9" stroke="white" stroke-width="2"/>
  <!-- House icon -->
  <polygon points="110,170 90,184 130,184" fill="white" opacity="0.8"/>
  <rect x="98" y="184" width="24" height="14" rx="2" fill="white" opacity="0.8"/>
  <text x="110" y="218" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4A90D9">Home</text>

  <!-- Store waypoint -->
  <rect x="200" y="110" width="76" height="44" rx="8" fill="#50C878" opacity="0.85" stroke="white" stroke-width="1.5"/>
  <text x="238" y="129" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">🛒</text>
  <text x="238" y="146" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Store</text>

  <!-- Snack Bar waypoint -->
  <rect x="354" y="188" width="88" height="44" rx="8" fill="#50C878" opacity="0.85" stroke="white" stroke-width="1.5"/>
  <text x="398" y="207" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">🥤</text>
  <text x="398" y="224" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Snack Bar</text>

  <!-- Restaurant waypoint -->
  <rect x="532" y="118" width="96" height="44" rx="8" fill="#50C878" opacity="0.85" stroke="white" stroke-width="1.5"/>
  <text x="580" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">🍽</text>
  <text x="580" y="154" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Restaurant</text>

  <!-- School -->
  <rect x="650" y="164" width="80" height="44" rx="8" fill="#E8744F" stroke="white" stroke-width="2"/>
  <!-- School icon (simple building) -->
  <rect x="666" y="170" width="48" height="32" rx="2" fill="white" opacity="0.3"/>
  <polygon points="690,168 666,182 714,182" fill="white" opacity="0.5"/>
  <text x="690" y="218" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E8744F">School</text>

  <!-- Step labels -->
  <text x="170" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Go to Store</text>
  <text x="310" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Go to Snack Bar</text>
  <text x="480" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Go to Restaurant</text>
  <text x="625" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Go to School</text>
</svg>
