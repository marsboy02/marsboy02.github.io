<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <rect width="800" height="340" fill="#F8F9FA"/>

  <defs>
    <marker id="routeArr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4A90D9"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Declarative (WHAT)</text>
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">Only the destination is declared — the system figures out the route</text>

  <!-- Map background -->
  <rect x="40" y="66" width="720" height="240" rx="12" fill="#EEF4FB" stroke="#CCDDEE" stroke-width="2"/>

  <!-- Map grid lines (subtle) -->
  <line x1="40" y1="130" x2="760" y2="130" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="40" y1="186" x2="760" y2="186" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="40" y1="242" x2="760" y2="242" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="200" y1="66" x2="200" y2="306" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="380" y1="66" x2="380" y2="306" stroke="#DDEEFF" stroke-width="1"/>
  <line x1="560" y1="66" x2="560" y2="306" stroke="#DDEEFF" stroke-width="1"/>

  <!-- Grayed-out waypoints (not part of route) -->
  <rect x="200" y="110" width="76" height="44" rx="8" fill="#CCCCCC" opacity="0.5" stroke="#BBBBBB" stroke-width="1"/>
  <text x="238" y="133" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AAAAAA">Store</text>

  <rect x="354" y="188" width="88" height="44" rx="8" fill="#CCCCCC" opacity="0.5" stroke="#BBBBBB" stroke-width="1"/>
  <text x="398" y="211" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AAAAAA">Snack Bar</text>

  <rect x="532" y="118" width="96" height="44" rx="8" fill="#CCCCCC" opacity="0.5" stroke="#BBBBBB" stroke-width="1"/>
  <text x="580" y="141" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AAAAAA">Restaurant</text>

  <!-- Direct dashed route: Home -> School -->
  <line x1="151" y1="186" x2="649" y2="186"
    stroke="#4A90D9" stroke-width="3" stroke-dasharray="10 5" marker-end="url(#routeArr)"/>

  <!-- "Auto" badge on the path -->
  <rect x="356" y="170" width="88" height="28" rx="14" fill="#4A90D9"/>
  <text x="400" y="188" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Auto</text>

  <!-- Home -->
  <rect x="70" y="164" width="80" height="44" rx="8" fill="#4A90D9" stroke="white" stroke-width="2"/>
  <polygon points="110,170 90,184 130,184" fill="white" opacity="0.8"/>
  <rect x="98" y="184" width="24" height="14" rx="2" fill="white" opacity="0.8"/>
  <text x="110" y="218" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4A90D9">Home</text>

  <!-- School -->
  <rect x="650" y="164" width="80" height="44" rx="8" fill="#E8744F" stroke="white" stroke-width="2"/>
  <rect x="666" y="170" width="48" height="32" rx="2" fill="white" opacity="0.3"/>
  <polygon points="690,168 666,182 714,182" fill="white" opacity="0.5"/>
  <text x="690" y="218" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E8744F">School</text>

  <!-- Annotation: only declare start and end -->
  <line x1="110" y1="208" x2="110" y2="248" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="110" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">declare: start</text>

  <line x1="690" y1="208" x2="690" y2="248" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="690" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">declare: end</text>

  <!-- Grayed waypoint labels -->
  <text x="238" y="168" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BBBBBB">(ignored)</text>
  <text x="398" y="246" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BBBBBB">(ignored)</text>
  <text x="580" y="176" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BBBBBB">(ignored)</text>
</svg>
