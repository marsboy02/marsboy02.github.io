<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">MVC Pattern</text>

  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4A90D9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E8744F"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#50C878"/>
    </marker>
    <marker id="arrowGray" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#999999"/>
    </marker>
  </defs>

  <!-- Model (top center) -->
  <rect x="300" y="60" width="200" height="80" rx="10" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#4A90D9">Model</text>
  <text x="400" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Data &amp; Business Logic</text>

  <!-- View (bottom left) -->
  <rect x="80" y="290" width="200" height="80" rx="10" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="2"/>
  <text x="180" y="328" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#50C878">View</text>
  <text x="180" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">UI / Display</text>

  <!-- Controller (bottom right) -->
  <rect x="520" y="290" width="200" height="80" rx="10" fill="#E8744F" opacity="0.2" stroke="#E8744F" stroke-width="2"/>
  <text x="620" y="328" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E8744F">Controller</text>
  <text x="620" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Input &amp; Control Logic</text>

  <!-- Arrow: Controller → Model (Manipulates) -->
  <path d="M 540 290 Q 490 200 480 145" fill="none" stroke="#E8744F" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="535" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E8744F">Manipulates</text>

  <!-- Arrow: Model → View (Updates) -->
  <path d="M 320 140 Q 270 220 260 285" fill="none" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="255" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4A90D9">Updates</text>

  <!-- Arrow: View → Controller (Sends input) -->
  <line x1="280" y1="340" x2="515" y2="340" stroke="#50C878" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#50C878">Sends input from user</text>

  <!-- Arrow: Controller → View (Sometimes updates directly) -->
  <line x1="515" y1="310" x2="285" y2="310" stroke="#999999" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowGray)"/>
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Sometimes updates directly</text>

  <!-- User icon hint -->
  <text x="180" y="280" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#AAAAAA">( User sees )</text>
  <text x="620" y="280" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#AAAAAA">( User interacts )</text>
</svg>
