<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Process Memory Structure</text>

  <!-- Address labels -->
  <text x="225" y="72" text-anchor="end" font-family="monospace" font-size="10" fill="#999999">0xFFFFFFFF</text>
  <text x="225" y="392" text-anchor="end" font-family="monospace" font-size="10" fill="#999999">0x00000000</text>

  <!-- Memory container -->
  <rect x="240" y="60" width="320" height="330" rx="6" fill="white" stroke="#666666" stroke-width="2"/>

  <!-- Code segment -->
  <rect x="240" y="60" width="320" height="70" rx="0" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1.5"/>
  <rect x="240" y="60" width="320" height="6" rx="6" fill="#4A90D9" opacity="0.4"/>
  <text x="400" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4A90D9">Code</text>
  <text x="400" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Program instructions</text>

  <!-- Data segment -->
  <rect x="240" y="130" width="320" height="70" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1.5"/>
  <text x="400" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E8744F">Data</text>
  <text x="400" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Global / Static variables</text>

  <!-- Heap segment -->
  <rect x="240" y="200" width="320" height="70" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.5"/>
  <text x="400" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#50C878">Heap</text>
  <text x="400" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Dynamic allocation ↓</text>

  <!-- Free space -->
  <rect x="240" y="270" width="320" height="50" fill="#F8F9FA" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AAAAAA" font-style="italic">free space</text>

  <!-- Stack segment -->
  <rect x="240" y="320" width="320" height="70" fill="#E8744F" opacity="0.4" stroke="#E8744F" stroke-width="1.5"/>
  <rect x="240" y="384" width="320" height="6" rx="6" fill="#E8744F" opacity="0.5"/>
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E8744F">Stack</text>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Local vars / Function calls ↑</text>

  <!-- Divider lines between segments -->
  <line x1="240" y1="130" x2="560" y2="130" stroke="#666666" stroke-width="1.5"/>
  <line x1="240" y1="200" x2="560" y2="200" stroke="#666666" stroke-width="1.5"/>
  <line x1="240" y1="270" x2="560" y2="270" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="240" y1="320" x2="560" y2="320" stroke="#666666" stroke-width="1.5"/>

  <!-- Address bracket -->
  <line x1="232" y1="60" x2="232" y2="390" stroke="#BBBBBB" stroke-width="1"/>
  <line x1="232" y1="60" x2="237" y2="60" stroke="#BBBBBB" stroke-width="1"/>
  <line x1="232" y1="390" x2="237" y2="390" stroke="#BBBBBB" stroke-width="1"/>
</svg>
