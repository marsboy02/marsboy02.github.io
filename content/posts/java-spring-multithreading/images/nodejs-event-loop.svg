<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <rect width="800" height="340" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Node.js: Single-thread Event Loop</text>

  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4A90D9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#50C878"/>
    </marker>
    <marker id="arrowOrange" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E8744F"/>
    </marker>
  </defs>

  <!-- Requests -->
  <rect x="30" y="70" width="100" height="36" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="80" y="93" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Request 1</text>

  <rect x="30" y="120" width="100" height="36" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="80" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Request 2</text>

  <rect x="30" y="170" width="100" height="36" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="80" y="193" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Request 3</text>

  <!-- Arrows to Event Loop -->
  <line x1="130" y1="88" x2="225" y2="138" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="130" y1="138" x2="225" y2="148" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="130" y1="188" x2="225" y2="158" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Event Loop (single thread) -->
  <rect x="230" y="95" width="160" height="100" rx="10" fill="#50C878" opacity="0.15" stroke="#50C878" stroke-width="2"/>
  <text x="310" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#50C878">Event Loop</text>
  <!-- Circular arrow icon -->
  <path d="M 290 155 A 18 18 0 1 1 330 155" fill="none" stroke="#50C878" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="310" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666666">Single Thread</text>

  <!-- Arrows to Async I/O -->
  <line x1="390" y1="120" x2="470" y2="80" stroke="#E8744F" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="390" y1="145" x2="470" y2="145" stroke="#E8744F" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="390" y1="170" x2="470" y2="210" stroke="#E8744F" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Async I/O blocks -->
  <rect x="475" y="60" width="120" height="36" rx="6" fill="#E8744F" opacity="0.2" stroke="#E8744F" stroke-width="1.5"/>
  <text x="535" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E8744F">Async I/O</text>

  <rect x="475" y="126" width="120" height="36" rx="6" fill="#E8744F" opacity="0.2" stroke="#E8744F" stroke-width="1.5"/>
  <text x="535" y="149" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E8744F">Async I/O</text>

  <rect x="475" y="192" width="120" height="36" rx="6" fill="#E8744F" opacity="0.2" stroke="#E8744F" stroke-width="1.5"/>
  <text x="535" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E8744F">Async I/O</text>

  <!-- Arrows to Callbacks -->
  <line x1="595" y1="78" x2="660" y2="78" stroke="#50C878" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="595" y1="144" x2="660" y2="144" stroke="#50C878" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="595" y1="210" x2="660" y2="210" stroke="#50C878" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Callback blocks -->
  <rect x="665" y="60" width="110" height="36" rx="6" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1.5"/>
  <text x="720" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#50C878">Callback</text>

  <rect x="665" y="126" width="110" height="36" rx="6" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1.5"/>
  <text x="720" y="149" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#50C878">Callback</text>

  <rect x="665" y="192" width="110" height="36" rx="6" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1.5"/>
  <text x="720" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#50C878">Callback</text>

  <!-- Return arrows from Callbacks back to Event Loop -->
  <path d="M 720 228 L 720 280 L 310 280 L 310 200" fill="none" stroke="#50C878" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>
  <text x="515" y="296" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Results return to Event Loop</text>
</svg>
