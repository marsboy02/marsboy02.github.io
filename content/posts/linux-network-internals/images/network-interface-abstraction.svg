<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="hwGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="virtualGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
  </defs>

  <rect width="860" height="500" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Network Interfaces: The Kernel's Abstraction Layer</text>

  <!-- Userspace -->
  <rect x="40" y="55" width="780" height="55" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
  <text x="430" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Userspace (Applications)</text>
  <text x="430" y="97" text-anchor="middle" font-size="11" fill="#3b82f6">curl, nginx, Tailscale, Docker — deliver data to kernel via socket()</text>

  <!-- Arrows down -->
  <line x1="180" y1="110" x2="180" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="430" y1="110" x2="430" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="680" y1="110" x2="680" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Kernel -->
  <rect x="40" y="140" width="780" height="125" rx="8" fill="url(#kernelGrad)" filter="url(#s)"/>
  <text x="60" y="163" font-size="12" font-weight="600" fill="#e2e8f0">Kernel — Unified Interface Abstraction (ifnet / net_device)</text>

  <!-- Interface cards -->
  <rect x="60" y="178" width="130" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="125" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">en0</text>
  <text x="125" y="218" text-anchor="middle" font-size="10" fill="#64748b">Wi-Fi / Ethernet</text>
  <text x="125" y="234" text-anchor="middle" font-size="10" fill="#64748b">Physical IF</text>

  <rect x="210" y="178" width="130" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="275" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">lo0</text>
  <text x="275" y="218" text-anchor="middle" font-size="10" fill="#64748b">Loopback</text>
  <text x="275" y="234" text-anchor="middle" font-size="10" fill="#64748b">127.0.0.1</text>

  <rect x="360" y="178" width="130" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="425" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">utun / wg0</text>
  <text x="425" y="218" text-anchor="middle" font-size="10" fill="#64748b">TUN Tunnel</text>
  <text x="425" y="234" text-anchor="middle" font-size="10" fill="#64748b">VPN (WireGuard)</text>

  <rect x="510" y="178" width="140" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="580" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">bridge0</text>
  <text x="580" y="218" text-anchor="middle" font-size="10" fill="#64748b">Virtual L2 Switch</text>
  <text x="580" y="234" text-anchor="middle" font-size="10" fill="#64748b">Groups multiple IFs</text>

  <rect x="670" y="178" width="130" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="735" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">veth</text>
  <text x="735" y="218" text-anchor="middle" font-size="10" fill="#64748b">Container Pipe</text>
  <text x="735" y="234" text-anchor="middle" font-size="10" fill="#64748b">Namespace bridge</text>

  <!-- Arrows to backends -->
  <line x1="125" y1="265" x2="125" y2="298" stroke="#059669" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="275" y1="265" x2="275" y2="298" stroke="#7c3aed" stroke-width="2" marker-end="url(#a3)"/>
  <line x1="425" y1="265" x2="425" y2="298" stroke="#7c3aed" stroke-width="2" marker-end="url(#a3)"/>
  <line x1="580" y1="265" x2="580" y2="298" stroke="#7c3aed" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Backend boxes -->
  <rect x="45" y="302" width="160" height="52" rx="8" fill="url(#hwGrad)" filter="url(#s)"/>
  <text x="125" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="white">Wi-Fi Chip / NIC</text>
  <text x="125" y="342" text-anchor="middle" font-size="10" fill="#a7f3d0">HW → Radio / Electric</text>

  <rect x="210" y="302" width="130" height="52" rx="8" fill="url(#virtualGrad)" filter="url(#s)"/>
  <text x="275" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="white">Kernel Memory</text>
  <text x="275" y="342" text-anchor="middle" font-size="10" fill="#ddd6fe">Loops back instantly</text>

  <rect x="360" y="302" width="130" height="52" rx="8" fill="url(#virtualGrad)" filter="url(#s)"/>
  <text x="425" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="white">Userspace App</text>
  <text x="425" y="342" text-anchor="middle" font-size="10" fill="#ddd6fe">Encrypt &amp; resend</text>

  <rect x="510" y="302" width="140" height="52" rx="8" fill="url(#virtualGrad)" filter="url(#s)"/>
  <text x="580" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="white">L2 Frame Forwarding</text>
  <text x="580" y="342" text-anchor="middle" font-size="10" fill="#ddd6fe">Virtual switch</text>

  <!-- Insight box -->
  <rect x="40" y="385" width="780" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Key: The kernel treats every interface with the same abstraction</text>
  <text x="430" y="430" text-anchor="middle" font-size="11" fill="#a16207">"Put a packet in, it goes somewhere" — same contract for physical and virtual</text>

  <!-- Legend -->
  <rect x="40" y="460" width="14" height="14" rx="3" fill="url(#hwGrad)"/>
  <text x="62" y="472" font-size="11" fill="#475569">Physical Hardware</text>
  <rect x="190" y="460" width="14" height="14" rx="3" fill="url(#virtualGrad)"/>
  <text x="212" y="472" font-size="11" fill="#475569">Virtual (Software)</text>
</svg>