<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#dbeafe"/><stop offset="100%" style="stop-color:#bfdbfe"/></linearGradient>
    <linearGradient id="kg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1e293b"/><stop offset="100%" style="stop-color:#334155"/></linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>

  <rect width="760" height="540" fill="#f8fafc" rx="12"/>
  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Linux Kernel Network Stack</text>

  <!-- Userspace -->
  <rect x="40" y="50" width="680" height="52" rx="8" fill="url(#ug)" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
  <text x="380" y="73" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Userspace — Applications</text>
  <text x="380" y="91" text-anchor="middle" font-size="11" fill="#3b82f6">curl, nginx, Tailscale — socket(), send(), recv()</text>

  <line x1="380" y1="102" x2="380" y2="125" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Kernel -->
  <rect x="40" y="127" width="680" height="385" rx="8" fill="url(#kg)" filter="url(#s)"/>
  <text x="60" y="148" font-size="12" font-weight="600" fill="#94a3b8">Kernel Space</text>

  <!-- Socket -->
  <rect x="70" y="158" width="620" height="42" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="380" y="177" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Socket Layer</text>
  <text x="380" y="193" text-anchor="middle" font-size="10" fill="#64748b">Per-process fd, send/recv buffer management</text>
  <text x="700" y="180" fill="#64748b" font-weight="600"><tspan font-size="10">L5</tspan><tspan font-size="7" dy="-2">+</tspan></text>

  <line x1="380" y1="200" x2="380" y2="215" stroke="#64748b" stroke-width="1" marker-end="url(#a)"/>

  <!-- Transport -->
  <rect x="70" y="217" width="620" height="42" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="380" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">TCP / UDP / ICMP — L4 Transport</text>
  <text x="380" y="252" text-anchor="middle" font-size="10" fill="#64748b">Seq, flow control, retransmit, congestion (TCP) / passthrough (UDP)</text>
  <text x="700" y="239" font-size="10" fill="#64748b" font-weight="600">L4</text>

  <line x1="380" y1="259" x2="380" y2="274" stroke="#64748b" stroke-width="1" marker-end="url(#a)"/>

  <!-- IP + Netfilter -->
  <rect x="70" y="276" width="620" height="52" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="315" y="299" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">IP Layer — L3 Routing</text>
  <text x="445" y="299" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">⟷ Netfilter Hooks</text>
  <text x="380" y="319" text-anchor="middle" font-size="10" fill="#a16207">Routing table lookup + filtering / NAT (iptables rules)</text>
  <text x="700" y="300" font-size="10" fill="#64748b" font-weight="600">L3</text>

  <line x1="380" y1="328" x2="380" y2="343" stroke="#64748b" stroke-width="1" marker-end="url(#a)"/>

  <!-- Net device -->
  <rect x="70" y="345" width="620" height="42" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="380" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Network Device Subsystem</text>
  <text x="380" y="380" text-anchor="middle" font-size="10" fill="#64748b">Interface mgmt, MTU, state (UP/DOWN), tc/qdisc queuing</text>
  <text x="700" y="367" font-size="10" fill="#64748b" font-weight="600">L2</text>

  <line x1="380" y1="387" x2="380" y2="402" stroke="#64748b" stroke-width="1" marker-end="url(#a)"/>

  <!-- Drivers -->
  <rect x="70" y="404" width="195" height="48" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="167" y="425" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">NIC Driver</text>
  <text x="167" y="443" text-anchor="middle" font-size="10" fill="#16a34a">Physical HW control</text>

  <rect x="283" y="404" width="195" height="48" rx="6" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="380" y="425" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">TUN Driver</text>
  <text x="380" y="443" text-anchor="middle" font-size="10" fill="#7c3aed">Userspace bridge</text>

  <rect x="496" y="404" width="195" height="48" rx="6" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="593" y="425" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">veth Driver</text>
  <text x="593" y="443" text-anchor="middle" font-size="10" fill="#7c3aed">Container namespace</text>

  <text x="700" y="430" font-size="10" fill="#64748b" font-weight="600">L1</text>

  <!-- Bottom labels -->
  <line x1="167" y1="452" x2="167" y2="475" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="167" y="490" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">NIC → Radio / Electric</text>
  <line x1="380" y1="452" x2="380" y2="475" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="380" y="490" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">↕ Tailscale / VPN</text>
  <line x1="593" y1="452" x2="593" y2="475" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="593" y="490" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">↕ Pod / Container</text>

</svg>