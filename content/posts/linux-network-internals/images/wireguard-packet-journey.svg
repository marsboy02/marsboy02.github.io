<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#334155"/></marker>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#7c3aed"/><stop offset="100%" style="stop-color:#a78bfa"/></linearGradient>
  </defs>

  <rect width="850" height="440" fill="#f8fafc" rx="12"/>
  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">WireGuard Packet Journey — Encapsulation &amp; MTU</text>

  <!-- Original Packet -->
  <text x="40" y="68" font-size="13" font-weight="600" fill="#0f172a">1. Original Packet (App → wg0)</text>
  <rect x="40" y="78" width="770" height="40" rx="6" fill="white" stroke="#e2e8f0" filter="url(#s)"/>
  <rect x="45" y="83" width="130" height="30" rx="4" fill="#dbeafe"/>
  <text x="110" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">IP Header (20B)</text>
  <rect x="180" y="83" width="105" height="30" rx="4" fill="#dcfce7"/>
  <text x="232" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">TCP (20B)</text>
  <rect x="290" y="83" width="515" height="30" rx="4" fill="#f1f5f9"/>
  <text x="547" y="103" text-anchor="middle" font-size="10" fill="#64748b">Application Data (up to 1460 bytes)</text>
  <text x="815" y="72" text-anchor="end" font-size="11" fill="#64748b">≤ 1500B</text>

  <line x1="425" y1="123" x2="425" y2="148" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="450" y="140" font-size="10" fill="#7c3aed" font-weight="600">WireGuard Encryption</text>

  <!-- Encapsulated Packet -->
  <text x="40" y="168" font-size="13" font-weight="600" fill="#0f172a">2. Encapsulated Packet (wg0 → eth0/en0)</text>
  <rect x="40" y="178" width="770" height="44" rx="6" fill="white" stroke="#7c3aed" stroke-width="1.5" filter="url(#s)"/>

  <rect x="45" y="183" width="85" height="34" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="87" y="198" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Outer IP</text>
  <text x="87" y="211" text-anchor="middle" font-size="8" fill="#a16207">20B</text>

  <rect x="135" y="183" width="65" height="34" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="167" y="198" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">UDP</text>
  <text x="167" y="211" text-anchor="middle" font-size="8" fill="#a16207">8B</text>

  <rect x="205" y="183" width="70" height="34" rx="4" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="240" y="198" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">WG Hdr</text>
  <text x="240" y="211" text-anchor="middle" font-size="8" fill="#7c3aed">32B</text>

  <rect x="280" y="183" width="480" height="34" rx="4" fill="url(#eg)"/>
  <text x="520" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="white">🔒 Encrypted Original Packet (ChaCha20-Poly1305)</text>

  <rect x="765" y="183" width="40" height="34" rx="4" fill="#fce7f3" stroke="#ec4899"/>
  <text x="785" y="205" text-anchor="middle" font-size="8" font-weight="600" fill="#9d174d">Auth 16B</text>

  <text x="815" y="173" text-anchor="end" font-size="11" fill="#dc2626" font-weight="600">≤ 1580B!</text>

  <!-- Overhead box -->
  <rect x="40" y="248" width="380" height="165" rx="8" fill="white" stroke="#e2e8f0" filter="url(#s)"/>
  <text x="230" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Encapsulation Overhead (~80 bytes)</text>
  <line x1="60" y1="284" x2="400" y2="284" stroke="#e2e8f0"/>

  <text x="75" y="306" font-size="11" fill="#475569">Outer IPv4 Header</text>
  <text x="390" y="306" text-anchor="end" font-size="11" fill="#64748b">20 bytes</text>
  <text x="75" y="326" font-size="11" fill="#475569">UDP Header</text>
  <text x="390" y="326" text-anchor="end" font-size="11" fill="#64748b">8 bytes</text>
  <text x="75" y="346" font-size="11" fill="#475569">WireGuard Header</text>
  <text x="390" y="346" text-anchor="end" font-size="11" fill="#64748b">32 bytes</text>
  <text x="75" y="366" font-size="11" fill="#475569">Poly1305 Auth Tag + misc</text>
  <text x="390" y="366" text-anchor="end" font-size="11" fill="#64748b">20 bytes</text>
  <line x1="60" y1="375" x2="400" y2="375" stroke="#334155" stroke-width="1.5"/>
  <text x="75" y="392" font-size="12" font-weight="700" fill="#0f172a">Total</text>
  <text x="390" y="392" text-anchor="end" font-size="12" font-weight="700" fill="#dc2626">~80 bytes</text>

  <!-- MTU box -->
  <rect x="450" y="248" width="360" height="165" rx="8" fill="#fef3c7" stroke="#f59e0b" filter="url(#s)"/>
  <text x="630" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">MTU Resolution Strategy</text>
  <line x1="470" y1="284" x2="790" y2="284" stroke="#f59e0b"/>

  <text x="480" y="310" font-size="11" fill="#78350f" font-weight="600">Physical NIC MTU</text>
  <text x="790" y="310" text-anchor="end" font-size="11" fill="#92400e">1500</text>
  <text x="480" y="333" font-size="11" fill="#78350f" font-weight="600">WireGuard Overhead</text>
  <text x="790" y="333" text-anchor="end" font-size="11" fill="#dc2626">− 80</text>
  <line x1="470" y1="343" x2="790" y2="343" stroke="#92400e"/>
  <text x="480" y="365" font-size="12" fill="#78350f" font-weight="700">TUN Interface MTU</text>
  <text x="790" y="365" text-anchor="end" font-size="12" fill="#059669" font-weight="700">1420</text>
  <text x="630" y="395" text-anchor="middle" font-size="10" fill="#a16207">Tailscale conservatively sets 1380 (1500 − 120)</text>
</svg>