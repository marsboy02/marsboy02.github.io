<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#dc2626"/><stop offset="100%" style="stop-color:#ef4444"/></linearGradient>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#3b82f6"/></linearGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#059669"/><stop offset="100%" style="stop-color:#10b981"/></linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#334155"/></marker>
  </defs>

  <rect width="840" height="500" fill="#f8fafc" rx="12"/>
  <text x="420" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Netfilter's 5 Hooks — Packet Flow &amp; Checkpoints</text>

  <!-- Host boundary -->
  <rect x="100" y="48" width="640" height="430" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <text x="120" y="70" font-size="11" font-weight="600" fill="#94a3b8">This Host (Kernel)</text>

  <!-- Packet IN -->
  <text x="45" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Packet</text>
  <text x="45" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Arrives</text>
  <line x1="80" y1="173" x2="138" y2="173" stroke="#334155" stroke-width="2" marker-end="url(#a)"/>

  <!-- PREROUTING -->
  <rect x="143" y="143" width="160" height="55" rx="8" fill="url(#hg)" filter="url(#s)"/>
  <text x="223" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="white">① PREROUTING</text>
  <text x="223" y="186" text-anchor="middle" font-size="10" fill="#fecaca">DNAT (Dest Rewrite)</text>

  <line x1="303" y1="173" x2="345" y2="173" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Routing Decision -->
  <rect x="350" y="148" width="160" height="50" rx="8" fill="url(#rg)" filter="url(#s)"/>
  <text x="430" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="white">Routing Decision</text>
  <text x="430" y="188" text-anchor="middle" font-size="10" fill="#bfdbfe">Destined for me?</text>

  <!-- Branch: Yes → INPUT -->
  <line x1="400" y1="148" x2="400" y2="108" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="378" y="130" font-size="9" fill="#059669" font-weight="600">Yes</text>

  <rect x="330" y="55" width="140" height="50" rx="8" fill="url(#hg)" filter="url(#s)"/>
  <text x="400" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">③ INPUT</text>
  <text x="400" y="95" text-anchor="middle" font-size="10" fill="#fecaca">Firewall Filtering</text>

  <line x1="470" y1="80" x2="510" y2="80" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Local Process -->
  <rect x="515" y="55" width="170" height="50" rx="8" fill="url(#pg)" filter="url(#s)"/>
  <text x="600" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">Local Process</text>
  <text x="600" y="95" text-anchor="middle" font-size="10" fill="#a7f3d0">nginx, ssh, app …</text>

  <line x1="600" y1="105" x2="600" y2="232" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- OUTPUT -->
  <rect x="530" y="237" width="140" height="50" rx="8" fill="url(#hg)" filter="url(#s)"/>
  <text x="600" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="white">⑤ OUTPUT</text>
  <text x="600" y="277" text-anchor="middle" font-size="10" fill="#fecaca">Outbound Filter</text>

  <!-- Branch: No → FORWARD -->
  <line x1="400" y1="198" x2="400" y2="243" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="415" y="218" font-size="9" fill="#dc2626" font-weight="600">No</text>

  <rect x="330" y="245" width="140" height="50" rx="8" fill="url(#hg)" filter="url(#s)"/>
  <text x="400" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="white">④ FORWARD</text>
  <text x="400" y="285" text-anchor="middle" font-size="10" fill="#fecaca">Transit Filtering</text>

  <!-- Merge to POSTROUTING -->
  <line x1="400" y1="295" x2="400" y2="340" stroke="#334155" stroke-width="1.5"/>
  <line x1="600" y1="287" x2="600" y2="340" stroke="#334155" stroke-width="1.5"/>
  <line x1="400" y1="340" x2="500" y2="360" stroke="#334155" stroke-width="1.5"/>
  <line x1="600" y1="340" x2="500" y2="360" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- POSTROUTING -->
  <rect x="415" y="365" width="170" height="55" rx="8" fill="url(#hg)" filter="url(#s)"/>
  <text x="500" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="white">⑥ POSTROUTING</text>
  <text x="500" y="408" text-anchor="middle" font-size="10" fill="#fecaca">SNAT / MASQUERADE</text>

  <line x1="500" y1="420" x2="500" y2="448" stroke="#334155" stroke-width="2" marker-end="url(#a)"/>
  <text x="500" y="465" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Packet Out →</text>

</svg>