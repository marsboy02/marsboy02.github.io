<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 455" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrow-up" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="455" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Flannel VXLAN: Cross-Node Pod Communication (End-to-End)</text>

  <!-- ===== NODE 1 ===== -->
  <rect x="20" y="52" width="310" height="390" rx="10" fill="#e8f4f8" stroke="#2980b9" stroke-width="2" filter="url(#s)"/>
  <text x="175" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#2980b9">Node 1  (192.168.1.10)</text>

  <!-- Pod A box -->
  <rect x="55" y="88" width="180" height="72" rx="8" fill="#ffffff" stroke="#2980b9" stroke-width="1.5" filter="url(#s)"/>
  <text x="145" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Pod A</text>
  <rect x="88" y="120" width="114" height="28" rx="6" fill="#e8f4f8" stroke="#2980b9" stroke-width="1"/>
  <text x="145" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#2980b9">eth0  10.42.0.11</text>

  <!-- Step badge 1 -->
  <circle cx="55" cy="124" r="11" fill="#2980b9"/>
  <text x="55" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">①</text>

  <!-- vethA dashed connector -->
  <line x1="145" y1="160" x2="145" y2="192" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="145" cy="160" r="4" fill="#f39c12"/>
  <circle cx="145" cy="192" r="4" fill="#f39c12"/>
  <text x="158" y="180" font-size="11" font-weight="600" fill="#f39c12">vethA</text>

  <!-- cni0 bridge -->
  <rect x="55" y="192" width="180" height="56" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2" filter="url(#s)"/>
  <text x="145" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">cni0 bridge</text>
  <text x="145" y="234" text-anchor="middle" font-size="11" fill="#27ae60">10.42.0.1  —  L2 Forwarding</text>

  <!-- Step badge 2 -->
  <circle cx="55" cy="220" r="11" fill="#27ae60"/>
  <text x="55" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">②</text>

  <!-- Host routing label -->
  <text x="145" y="258" text-anchor="middle" font-size="11" fill="#64748b">Host routing: 10.42.1.0/24 → flannel.1</text>

  <!-- flannel.1 VTEP -->
  <rect x="55" y="276" width="180" height="60" rx="8" fill="#ffffff" stroke="#8e44ad" stroke-width="2" filter="url(#s)"/>
  <text x="145" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">flannel.1  (VTEP)</text>
  <text x="145" y="318" text-anchor="middle" font-size="11" fill="#8e44ad">Encapsulate → VXLAN / UDP 8472</text>

  <!-- Step badge 3 -->
  <circle cx="55" cy="306" r="11" fill="#8e44ad"/>
  <text x="55" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">③</text>

  <!-- eth0 NIC Node 1 -->
  <rect x="55" y="358" width="180" height="56" rx="8" fill="#ffffff" stroke="#2980b9" stroke-width="1.5" filter="url(#s)"/>
  <text x="145" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">eth0 (NIC)</text>
  <text x="145" y="400" text-anchor="middle" font-size="11" fill="#64748b">192.168.1.10</text>

  <!-- Step badge 4 -->
  <circle cx="55" cy="386" r="11" fill="#2980b9"/>
  <text x="55" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">④</text>

  <!-- Arrows inside Node 1 (downward) -->
  <line x1="145" y1="248" x2="145" y2="276" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="145" y1="336" x2="145" y2="358" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHYSICAL NETWORK ===== -->
  <rect x="346" y="148" width="168" height="220" rx="10" fill="#fefce8" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#s)"/>
  <text x="430" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#f39c12">Physical Network</text>

  <!-- UDP packet box -->
  <rect x="366" y="198" width="128" height="48" rx="8" fill="#ffffff" stroke="#f39c12" stroke-width="1.5" filter="url(#s)"/>
  <text x="430" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">UDP Packet</text>
  <text x="430" y="234" text-anchor="middle" font-size="10" fill="#f39c12">VXLAN encapsulated</text>

  <!-- ===== NODE 2 ===== -->
  <rect x="530" y="52" width="310" height="390" rx="10" fill="#eaf7ee" stroke="#27ae60" stroke-width="2" filter="url(#s)"/>
  <text x="685" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#27ae60">Node 2  (192.168.1.20)</text>

  <!-- eth0 NIC Node 2 -->
  <rect x="625" y="358" width="180" height="56" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" filter="url(#s)"/>
  <text x="715" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">eth0 (NIC)</text>
  <text x="715" y="400" text-anchor="middle" font-size="11" fill="#64748b">192.168.1.20</text>

  <!-- Step badge 5a -->
  <circle cx="805" cy="386" r="11" fill="#27ae60"/>
  <text x="805" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">⑤</text>

  <!-- flannel.1 VTEP Node 2 -->
  <rect x="625" y="276" width="180" height="60" rx="8" fill="#ffffff" stroke="#8e44ad" stroke-width="2" filter="url(#s)"/>
  <text x="715" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">flannel.1  (VTEP)</text>
  <text x="715" y="318" text-anchor="middle" font-size="11" fill="#8e44ad">Decapsulate ← VXLAN / UDP 8472</text>

  <!-- Step badge 5b -->
  <circle cx="805" cy="306" r="11" fill="#8e44ad"/>
  <text x="805" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">⑤</text>

  <!-- cni0 bridge Node 2 -->
  <rect x="625" y="192" width="180" height="56" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2" filter="url(#s)"/>
  <text x="715" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">cni0 bridge</text>
  <text x="715" y="234" text-anchor="middle" font-size="11" fill="#27ae60">10.42.1.1  —  L2 Forwarding</text>

  <!-- Step badge 6 -->
  <circle cx="805" cy="220" r="11" fill="#27ae60"/>
  <text x="805" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">⑥</text>

  <!-- vethC dashed connector -->
  <line x1="715" y1="160" x2="715" y2="192" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="715" cy="160" r="4" fill="#f39c12"/>
  <circle cx="715" cy="192" r="4" fill="#f39c12"/>
  <text x="728" y="180" font-size="11" font-weight="600" fill="#f39c12">vethC</text>

  <!-- Pod C box -->
  <rect x="625" y="88" width="180" height="72" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" filter="url(#s)"/>
  <text x="715" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Pod C</text>
  <rect x="651" y="120" width="128" height="28" rx="6" fill="#eaf7ee" stroke="#27ae60" stroke-width="1"/>
  <text x="715" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#27ae60">eth0  10.42.1.15</text>

  <!-- Step badge 7 -->
  <circle cx="805" cy="124" r="11" fill="#27ae60"/>
  <text x="805" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">⑦</text>

  <!-- Arrows inside Node 2 (upward) -->
  <line x1="715" y1="358" x2="715" y2="338" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-up)"/>
  <line x1="715" y1="276" x2="715" y2="250" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-up)"/>

  <!-- Host routing label Node 2 -->
  <text x="715" y="258" text-anchor="middle" font-size="11" fill="#64748b">Host routing → cni0</text>

  <!-- Cross-node arrows (drawn last for top z-order) -->
  <line x1="235" y1="386" x2="345" y2="280" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="515" y1="280" x2="625" y2="386" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-up)"/>
  <text x="430" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">192.168.1.10 → 192.168.1.20</text>
  <text x="430" y="315" text-anchor="middle" font-size="10" fill="#64748b">Outer IP header</text>
</svg>
