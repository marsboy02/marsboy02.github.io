<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="300" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">VTEP and FDB Mapping</text>

  <!-- Node 1 box -->
  <rect x="20" y="55" width="240" height="220" rx="10" fill="#e8f4f8" filter="url(#s)"/>
  <text x="140" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Node 1 (192.168.1.10)</text>

  <!-- VTEP box Node 1 -->
  <rect x="45" y="95" width="190" height="52" rx="8" fill="#2980b9" filter="url(#s)"/>
  <text x="140" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">flannel.1 (VTEP)</text>
  <text x="140" y="135" text-anchor="middle" font-size="11" fill="#dbeeff">MAC: aa:bb:cc:...:01</text>

  <!-- FDB table Node 1 -->
  <rect x="45" y="160" width="190" height="50" rx="6" fill="#ffffff" opacity="0.85"/>
  <text x="140" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">FDB Table</text>
  <text x="140" y="198" text-anchor="middle" font-size="10" fill="#1e293b" font-family="'SF Mono', 'Fira Code', monospace">aa:bb:cc:...:02 → 192.168.1.20</text>

  <!-- Node 2 box -->
  <rect x="500" y="55" width="240" height="220" rx="10" fill="#eaf7ee" filter="url(#s)"/>
  <text x="620" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Node 2 (192.168.1.20)</text>

  <!-- VTEP box Node 2 -->
  <rect x="525" y="95" width="190" height="52" rx="8" fill="#27ae60" filter="url(#s)"/>
  <text x="620" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">flannel.1 (VTEP)</text>
  <text x="620" y="135" text-anchor="middle" font-size="11" fill="#d4f5e2">MAC: aa:bb:cc:...:02</text>

  <!-- FDB table Node 2 -->
  <rect x="525" y="160" width="190" height="50" rx="6" fill="#ffffff" opacity="0.85"/>
  <text x="620" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">FDB Table</text>
  <text x="620" y="198" text-anchor="middle" font-size="10" fill="#1e293b" font-family="'SF Mono', 'Fira Code', monospace">aa:bb:cc:...:01 → 192.168.1.10</text>

  <!-- Physical Network label -->
  <text x="380" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">Physical Network</text>

  <!-- Dashed line connecting nodes -->
  <line x1="235" y1="121" x2="525" y2="121" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- UDP label on line -->
  <rect x="340" y="88" width="80" height="20" rx="4" fill="#f1f5f9"/>
  <text x="380" y="102" text-anchor="middle" font-size="11" fill="#475569" font-family="'SF Mono', 'Fira Code', monospace">UDP :8472</text>

  <!-- Arrow Node1 -> Node2 (above line) -->
  <line x1="240" y1="113" x2="520" y2="113" stroke="#2980b9" stroke-width="1.5"/>
  <polygon points="520,113 512,109 512,117" fill="#2980b9"/>

  <!-- Arrow Node2 -> Node1 (below line) -->
  <line x1="520" y1="129" x2="240" y2="129" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="240,129 248,125 248,133" fill="#27ae60"/>
</svg>
