<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#F8F9FA"/>

  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Java/Spring vs Node.js</text>

  <defs>
    <marker id="aB3" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4A90D9"/>
    </marker>
    <marker id="aO3" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E8744F"/>
    </marker>
    <marker id="aG3" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#50C878"/>
    </marker>
  </defs>

  <!-- ===== Left: Java/Spring ===== -->
  <text x="200" y="58" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E8744F">Java/Spring</text>
  <text x="200" y="74" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Multi-thread Model</text>

  <!-- Requests -->
  <rect x="30" y="95" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="65" y="111" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 1</text>

  <rect x="30" y="127" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="65" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 2</text>

  <rect x="30" y="159" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="65" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 3</text>

  <rect x="30" y="191" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="65" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 4</text>

  <!-- Thread Pool -->
  <rect x="130" y="85" width="160" height="145" rx="8" fill="#E8744F" opacity="0.08" stroke="#E8744F" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="210" y="102" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E8744F">Thread Pool</text>

  <rect x="145" y="110" width="130" height="22" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="210" y="125" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">Thread 1 → Req 1</text>

  <rect x="145" y="138" width="130" height="22" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="210" y="153" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">Thread 2 → Req 2</text>

  <rect x="145" y="166" width="130" height="22" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="210" y="181" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">Thread 3 → Req 3</text>

  <rect x="145" y="194" width="130" height="22" rx="4" fill="#E8744F" opacity="0.15" stroke="#E8744F" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="210" y="209" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999999">Thread 4 → Req 4</text>

  <!-- Arrows -->
  <line x1="100" y1="107" x2="140" y2="118" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>
  <line x1="100" y1="139" x2="140" y2="147" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>
  <line x1="100" y1="171" x2="140" y2="175" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>
  <line x1="100" y1="203" x2="140" y2="204" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>

  <!-- Java characteristics -->
  <rect x="40" y="248" width="300" height="110" rx="6" fill="white" stroke="#E8744F" stroke-width="1"/>
  <text x="60" y="270" font-family="sans-serif" font-size="10" fill="#E8744F">+ CPU-intensive tasks</text>
  <text x="60" y="288" font-family="sans-serif" font-size="10" fill="#E8744F">+ Natural multi-core usage</text>
  <text x="60" y="306" font-family="sans-serif" font-size="10" fill="#E8744F">+ Enterprise / large systems</text>
  <text x="60" y="324" font-family="sans-serif" font-size="10" fill="#999999">- Thread memory overhead</text>
  <text x="60" y="342" font-family="sans-serif" font-size="10" fill="#999999">- Synchronization complexity</text>

  <!-- ===== Divider ===== -->
  <line x1="400" y1="50" x2="400" y2="365" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="372" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BBBBBB">vs</text>

  <!-- ===== Right: Node.js ===== -->
  <text x="600" y="58" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#50C878">Node.js</text>
  <text x="600" y="74" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Event Loop Model</text>

  <!-- Requests -->
  <rect x="430" y="95" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="465" y="111" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 1</text>

  <rect x="430" y="127" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="465" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 2</text>

  <rect x="430" y="159" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="465" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 3</text>

  <rect x="430" y="191" width="70" height="24" rx="4" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1"/>
  <text x="465" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4A90D9">Req 4</text>

  <!-- Event Loop -->
  <rect x="530" y="115" width="120" height="80" rx="8" fill="#50C878" opacity="0.15" stroke="#50C878" stroke-width="1.5"/>
  <text x="590" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#50C878">Event Loop</text>
  <text x="590" y="165" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Single Thread</text>

  <!-- Arrows to event loop -->
  <line x1="500" y1="107" x2="525" y2="130" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>
  <line x1="500" y1="139" x2="525" y2="145" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>
  <line x1="500" y1="171" x2="525" y2="160" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>
  <line x1="500" y1="203" x2="525" y2="180" stroke="#4A90D9" stroke-width="1" marker-end="url(#aB3)"/>

  <!-- libuv -->
  <rect x="680" y="95" width="90" height="50" rx="6" fill="#E8744F" opacity="0.15" stroke="#E8744F" stroke-width="1"/>
  <text x="725" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E8744F">libuv</text>
  <text x="725" y="133" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Thread Pool</text>

  <!-- Arrow to libuv -->
  <line x1="650" y1="140" x2="675" y2="125" stroke="#E8744F" stroke-width="1" marker-end="url(#aO3)"/>
  <text x="668" y="114" font-family="sans-serif" font-size="8" fill="#999999">I/O</text>

  <!-- Callback -->
  <rect x="680" y="160" width="90" height="35" rx="6" fill="#50C878" opacity="0.15" stroke="#50C878" stroke-width="1"/>
  <text x="725" y="182" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#50C878">Callbacks</text>

  <!-- Arrow callback return -->
  <path d="M 680 180 L 655 170" fill="none" stroke="#50C878" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#aG3)"/>

  <!-- Node.js characteristics -->
  <rect x="440" y="248" width="320" height="110" rx="6" fill="white" stroke="#50C878" stroke-width="1"/>
  <text x="460" y="270" font-family="sans-serif" font-size="10" fill="#50C878">+ I/O-intensive / real-time services</text>
  <text x="460" y="288" font-family="sans-serif" font-size="10" fill="#50C878">+ Lightweight concurrency</text>
  <text x="460" y="306" font-family="sans-serif" font-size="10" fill="#50C878">+ No Lock / No Deadlock</text>
  <text x="460" y="324" font-family="sans-serif" font-size="10" fill="#999999">- CPU-bound tasks block event loop</text>
  <text x="460" y="342" font-family="sans-serif" font-size="10" fill="#999999">- Single-core by default</text>
</svg>
