<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#F8F9FA"/>

  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Event Loop: Normal vs Blocked</text>

  <!-- ===== Left: Normal Flow ===== -->
  <text x="200" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#50C878">Normal (I/O bound)</text>

  <!-- Timeline -->
  <line x1="50" y1="80" x2="50" y2="280" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="40" y="78" text-anchor="end" font-family="sans-serif" font-size="9" fill="#999999">time</text>

  <!-- Request 1 -->
  <rect x="65" y="80" width="120" height="24" rx="4" fill="#50C878" opacity="0.3" stroke="#50C878" stroke-width="1"/>
  <text x="125" y="96" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">Req 1 (I/O)</text>

  <!-- Async offload -->
  <rect x="200" y="80" width="80" height="70" rx="4" fill="#E8744F" opacity="0.15" stroke="#E8744F" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="240" y="100" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">libuv</text>
  <text x="240" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">async</text>

  <!-- Request 2 -->
  <rect x="65" y="112" width="120" height="24" rx="4" fill="#50C878" opacity="0.3" stroke="#50C878" stroke-width="1"/>
  <text x="125" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">Req 2 (I/O)</text>

  <!-- Request 3 -->
  <rect x="65" y="144" width="120" height="24" rx="4" fill="#50C878" opacity="0.3" stroke="#50C878" stroke-width="1"/>
  <text x="125" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">Req 3 (I/O)</text>

  <!-- Callback 1 -->
  <rect x="65" y="176" width="120" height="24" rx="4" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
  <text x="125" y="192" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">Callback 1</text>

  <!-- Callback 2 -->
  <rect x="65" y="208" width="120" height="24" rx="4" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
  <text x="125" y="224" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">Callback 2</text>

  <!-- All responsive label -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#50C878">All requests processed quickly</text>

  <!-- ===== Divider ===== -->
  <line x1="400" y1="50" x2="400" y2="300" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ===== Right: Blocked Flow ===== -->
  <text x="600" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E8744F">Blocked (CPU bound)</text>

  <!-- Timeline -->
  <line x1="450" y1="80" x2="450" y2="280" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="440" y="78" text-anchor="end" font-family="sans-serif" font-size="9" fill="#999999">time</text>

  <!-- CPU Heavy Task - big block -->
  <rect x="465" y="80" width="180" height="140" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="2"/>
  <text x="555" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E8744F">CPU Heavy Task</text>
  <text x="555" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666666">Event Loop blocked</text>

  <!-- Blocked requests stacking -->
  <rect x="660" y="100" width="110" height="20" rx="3" fill="#999999" opacity="0.2" stroke="#999999" stroke-width="1"/>
  <text x="715" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999999">Req 2 waiting...</text>

  <rect x="660" y="128" width="110" height="20" rx="3" fill="#999999" opacity="0.2" stroke="#999999" stroke-width="1"/>
  <text x="715" y="142" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999999">Req 3 waiting...</text>

  <rect x="660" y="156" width="110" height="20" rx="3" fill="#999999" opacity="0.2" stroke="#999999" stroke-width="1"/>
  <text x="715" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999999">Req 4 waiting...</text>

  <!-- After unblock -->
  <rect x="465" y="228" width="180" height="24" rx="4" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1"/>
  <text x="555" y="244" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">Req 2 (finally)</text>

  <!-- Starvation label -->
  <text x="600" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E8744F">Other requests starved</text>
</svg>
