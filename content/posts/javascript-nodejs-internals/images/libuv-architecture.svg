<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <rect width="800" height="340" fill="#F8F9FA"/>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Node.js Architecture with libuv</text>

  <defs>
    <marker id="aB" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4A90D9"/>
    </marker>
    <marker id="aO" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E8744F"/>
    </marker>
    <marker id="aG" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#50C878"/>
    </marker>
  </defs>

  <!-- V8 Engine box -->
  <rect x="30" y="60" width="180" height="120" rx="8" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="120" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4A90D9">V8 Engine</text>

  <!-- Call Stack -->
  <rect x="50" y="100" width="140" height="30" rx="5" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="120" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">Call Stack</text>

  <!-- Heap -->
  <rect x="50" y="140" width="140" height="30" rx="5" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="120" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4A90D9">Memory Heap</text>

  <!-- Single Thread label -->
  <text x="120" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Single Thread</text>

  <!-- Arrow V8 → Event Loop -->
  <line x1="210" y1="120" x2="265" y2="120" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#aB)"/>

  <!-- libuv box -->
  <rect x="270" y="50" width="260" height="250" rx="10" fill="#E8744F" opacity="0.06" stroke="#E8744F" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E8744F">libuv</text>

  <!-- Event Loop -->
  <rect x="295" y="90" width="130" height="50" rx="8" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1.5"/>
  <text x="360" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#50C878">Event Loop</text>
  <text x="360" y="130" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Single Thread</text>

  <!-- Thread Pool -->
  <rect x="290" y="165" width="230" height="120" rx="6" fill="#E8744F" opacity="0.1" stroke="#E8744F" stroke-width="1.5"/>
  <text x="405" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Thread Pool (default: 4)</text>

  <!-- Thread boxes -->
  <rect x="300" y="195" width="100" height="30" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="350" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Thread 1</text>

  <rect x="410" y="195" width="100" height="30" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="460" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Thread 2</text>

  <rect x="300" y="235" width="100" height="30" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="350" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Thread 3</text>

  <rect x="410" y="235" width="100" height="30" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="460" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8744F">Thread 4</text>

  <!-- Arrow Event Loop → Thread Pool -->
  <line x1="360" y1="140" x2="360" y2="160" stroke="#E8744F" stroke-width="1.5" marker-end="url(#aO)"/>
  <text x="385" y="155" font-family="sans-serif" font-size="9" fill="#999999">heavy I/O</text>

  <!-- Arrow libuv → OS -->
  <line x1="530" y1="170" x2="590" y2="170" stroke="#E8744F" stroke-width="1.5" marker-end="url(#aO)"/>

  <!-- OS Async I/O -->
  <rect x="595" y="60" width="170" height="240" rx="8" fill="#50C878" opacity="0.08" stroke="#50C878" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="680" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#50C878">OS Kernel</text>

  <rect x="615" y="100" width="130" height="34" rx="5" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1"/>
  <text x="680" y="122" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">epoll (Linux)</text>

  <rect x="615" y="144" width="130" height="34" rx="5" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1"/>
  <text x="680" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">kqueue (macOS)</text>

  <rect x="615" y="188" width="130" height="34" rx="5" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1"/>
  <text x="680" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">IOCP (Windows)</text>

  <rect x="615" y="232" width="130" height="34" rx="5" fill="#50C878" opacity="0.2" stroke="#50C878" stroke-width="1"/>
  <text x="680" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#50C878">Network / File / DNS</text>

  <!-- Arrow Event Loop → OS direct -->
  <line x1="425" y1="110" x2="590" y2="110" stroke="#50C878" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="505" y="103" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999999">async I/O</text>

  <!-- Callback return -->
  <path d="M 595 250 L 560 250 L 560 310 L 120 310 L 120 200" fill="none" stroke="#50C878" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#aG)"/>
  <text x="340" y="325" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Callbacks return to Call Stack via Event Loop</text>
</svg>
