<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#F8F9FA"/>

  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333">Worker Threads Architecture</text>

  <defs>
    <marker id="aB2" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4A90D9"/>
    </marker>
    <marker id="aO2" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E8744F"/>
    </marker>
    <marker id="aG2" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#50C878"/>
    </marker>
  </defs>

  <!-- Main Thread box -->
  <rect x="40" y="55" width="280" height="210" rx="10" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="180" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4A90D9">Main Thread</text>

  <!-- V8 instance -->
  <rect x="60" y="95" width="110" height="40" rx="6" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="115" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90D9">V8 Instance</text>

  <!-- Event Loop -->
  <rect x="60" y="145" width="110" height="40" rx="6" fill="#50C878" opacity="0.25" stroke="#50C878" stroke-width="1.5"/>
  <text x="115" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#50C878">Event Loop</text>

  <!-- App Code -->
  <rect x="185" y="95" width="120" height="90" rx="6" fill="#4A90D9" opacity="0.12" stroke="#4A90D9" stroke-width="1"/>
  <text x="245" y="125" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">App Code</text>
  <text x="245" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">HTTP Server</text>
  <text x="245" y="159" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4A90D9">Request Handling</text>

  <!-- Non-blocking label -->
  <text x="180" y="245" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Non-blocking, handles all I/O</text>

  <!-- postMessage arrows -->
  <line x1="320" y1="130" x2="395" y2="100" stroke="#E8744F" stroke-width="1.5" marker-end="url(#aO2)"/>
  <line x1="320" y1="150" x2="395" y2="190" stroke="#E8744F" stroke-width="1.5" marker-end="url(#aO2)"/>

  <text x="360" y="100" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">postMessage()</text>
  <text x="360" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">postMessage()</text>

  <!-- Worker Thread 1 -->
  <rect x="400" y="55" width="180" height="100" rx="10" fill="#E8744F" opacity="0.08" stroke="#E8744F" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="490" y="75" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Worker Thread 1</text>

  <rect x="415" y="85" width="70" height="28" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="450" y="104" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">V8</text>

  <rect x="495" y="85" width="70" height="28" rx="4" fill="#E8744F" opacity="0.15" stroke="#E8744F" stroke-width="1"/>
  <text x="530" y="104" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">Event Loop</text>

  <text x="490" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">CPU-heavy task</text>

  <!-- Worker Thread 2 -->
  <rect x="400" y="165" width="180" height="100" rx="10" fill="#E8744F" opacity="0.08" stroke="#E8744F" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="490" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E8744F">Worker Thread 2</text>

  <rect x="415" y="195" width="70" height="28" rx="4" fill="#E8744F" opacity="0.25" stroke="#E8744F" stroke-width="1"/>
  <text x="450" y="214" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">V8</text>

  <rect x="495" y="195" width="70" height="28" rx="4" fill="#E8744F" opacity="0.15" stroke="#E8744F" stroke-width="1"/>
  <text x="530" y="214" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8744F">Event Loop</text>

  <text x="490" y="255" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">CPU-heavy task</text>

  <!-- SharedArrayBuffer -->
  <rect x="620" y="110" width="150" height="80" rx="8" fill="#50C878" opacity="0.15" stroke="#50C878" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="695" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#50C878">SharedArrayBuffer</text>
  <text x="695" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Shared Memory</text>
  <text x="695" y="173" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">(optional)</text>

  <!-- Arrows to shared memory -->
  <line x1="580" y1="115" x2="615" y2="135" stroke="#50C878" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#aG2)"/>
  <line x1="580" y1="210" x2="615" y2="170" stroke="#50C878" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#aG2)"/>
</svg>
